<!-- This is just for testing and documentation - we don't deploy this anywhere -->
<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- By default Mirador uses Roboto font. Be sure to load this or change the font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500">
    <link rel="stylesheet" href="../src/plugins/public/styles.css">
    <title>Mirador Example</title>
    <script type="module">
        import {Mirador, MiradorPlugins} from ".";
        document.addEventListener('DOMContentLoaded', function() {
            let sideBarOpen = true;

            if (Math.min(window.innerWidth) < 1500 || navigator.userAgent.indexOf("Mobi") > -1) {
                sideBarOpen = false;
            }

            const config = {
                id: 'viewer',
                windows: [{
                    // enable and show the image tools plugin controls
                    imageToolsEnabled: true,
                    normalsInverted: true,
                    imageToolsOpen: false,
                    sideBarOpen: sideBarOpen,
                    archioxPluginOpen: true,
                    showRelightDraggableLightButton: true,
                    manifestId: 'https://iiif.bodleian.ox.ac.uk/iiif/manifest/e18c7f45-8b8c-4ec2-9330-f96f6f1b500c.json'
                }],
                requests: {
                    // Manipulate IIIF HTTP requests (info.json, IIIF presentation manifests, annotations, etc) to add an Accept header so we use our v3 manifests
                    preprocessors: [
                        (url, options) => ({
                            ...options,
                            headers: {
                                // Preflight checks are triggered by the use of a colon in the profile, so if the CORS
                                // options aren't set correctly on the host server, the request will be rejected.
                                // Due to this we only use v3 content negotiation on bodleian resources
                                ...options.headers,
                                Accept: url.endsWith('/info.json')
                                    ? 'application/ld+json;profile="http://iiif.io/api/image/3/context.json"'
                                    : 'application/ld+json;profile="http://iiif.io/api/presentation/3/context.json"',
                                ...(url.endsWith('/info.json') && {'Cache-Control': 'no-cache'})
                            }
                        })
                    ],
                },
                theme: {
                    palette: {
                        primary: {
                            main: '#1967d2',
                        },
                    },
                },
                workspace: {
                    showZoomControls: true
                },
                osdConfig: {
                    //debugMode: true,
                    crossOriginPolicy: "Anonymous",
                    overlayPreserveContentDirection: false,
                },
            };
            // this includes all of the plugins under MiradorPlugins
            // it's the equivalent of [ ...MiradorPlugins.pluginA, ...MiradorPlugins.pluginB, ...MiradorPlugins.pluginC] for all plugins in MiradorPlugins
            Mirador.viewer(config, Object.values(MiradorPlugins).flatMap((e) => ([...e])));
        });
    </script>
</head>
<body>
<!-- Container element of Mirador whose id should be passed to the instantiating call as "id" -->
<div id="viewer"></div>
</body>
</html>
